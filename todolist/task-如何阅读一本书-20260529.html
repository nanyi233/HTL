<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>如何阅读一本书 · 任务地图</title>
<style>
  :root {
    --accent: #c9a961;
    --accent-soft: color-mix(in srgb, var(--accent) 35%, transparent);
    --bg-0: #0a0e1a;
    --bg-1: #111827;
    --bg-2: #1f2937;
    --fg-0: #e5e7eb;
    --fg-1: #9ca3af;
    --fg-2: #6b7280;
    --ok: #34d399;
    --warn: #fbbf24;
    --line: rgba(255, 255, 255, 0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
      "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: radial-gradient(ellipse at top, var(--bg-1) 0%, var(--bg-0) 60%);
    color: var(--fg-0);
    user-select: none;
  }

  #stars {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  .hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 10;
    background: linear-gradient(180deg, rgba(10,14,26,0.85) 0%, transparent 100%);
    backdrop-filter: blur(8px);
  }
  .hud-title {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .hud-title .meta { color: var(--fg-2); font-weight: 400; margin-left: 12px; font-size: 13px; }
  .hud-actions { display: flex; gap: 8px; align-items: center; }
  .btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--line);
    color: var(--fg-0);
    padding: 6px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
  }
  .btn:hover { background: rgba(255,255,255,0.12); border-color: var(--accent-soft); }

  .progress-bar {
    position: fixed;
    top: 64px; left: 24px; right: 24px;
    height: 4px;
    background: rgba(255,255,255,0.05);
    border-radius: 999px;
    overflow: hidden;
    z-index: 9;
  }
  .progress-fill {
    height: 100%;
    width: 0;
    background: linear-gradient(90deg, var(--accent), color-mix(in srgb, var(--accent) 50%, white));
    border-radius: 999px;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 0 12px var(--accent-soft);
  }

  .view {
    position: fixed;
    inset: 0;
    z-index: 1;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s, transform 0.4s;
  }
  .view.active {
    opacity: 1;
    pointer-events: auto;
  }
  .view.fade-out { transform: scale(0.96); }
  .view.fade-in  { transform: scale(1); }

  #global-svg {
    width: 100%;
    height: 100%;
    display: block;
  }
  .node-circle {
    cursor: pointer;
    transition: filter 0.2s, transform 0.2s;
    transform-box: fill-box;
    transform-origin: center;
  }
  .node-circle:hover { filter: brightness(1.4) drop-shadow(0 0 12px var(--accent)); transform: scale(1.08); }
  .node-label {
    pointer-events: none;
    fill: var(--fg-0);
    font-size: 13px;
    text-anchor: middle;
    dominant-baseline: middle;
  }
  .node-sub {
    pointer-events: none;
    fill: var(--fg-2);
    font-size: 11px;
    text-anchor: middle;
  }
  .root-node { animation: rootPulse 2.4s ease-in-out infinite; }
  @keyframes rootPulse {
    0%, 100% { filter: drop-shadow(0 0 8px var(--accent)); }
    50%      { filter: drop-shadow(0 0 22px var(--accent)); }
  }
  .edge-line {
    stroke: var(--line);
    stroke-width: 1.2;
    fill: none;
    stroke-dasharray: 4 6;
    animation: dashFlow 18s linear infinite;
  }
  @keyframes dashFlow {
    to { stroke-dashoffset: -200; }
  }

  .focus-wrap {
    width: 100%;
    height: 100%;
    overflow-y: auto;
    padding: 110px 32px 60px;
  }
  .focus-header {
    max-width: 760px;
    margin: 0 auto 28px;
  }
  .focus-back {
    background: none;
    border: none;
    color: var(--fg-1);
    cursor: pointer;
    font-size: 14px;
    padding: 8px 0;
    margin-bottom: 12px;
  }
  .focus-back:hover { color: var(--accent); }
  .focus-title {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .focus-sub { color: var(--fg-1); font-size: 14px; }

  .card-list {
    max-width: 760px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .card {
    position: relative;
    background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 18px 20px 18px 64px;
    transition: all 0.25s;
    overflow: hidden;
  }
  .card:hover {
    border-color: var(--accent-soft);
    transform: translateX(4px);
    box-shadow: 0 4px 24px rgba(0,0,0,0.25);
  }
  .card.done {
    opacity: 0.55;
  }
  .card.done .card-text {
    text-decoration: line-through;
    color: var(--fg-2);
  }
  .card-checkbox {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    width: 28px;
    height: 28px;
    border: 2px solid var(--fg-2);
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    background: transparent;
  }
  .card-checkbox:hover { border-color: var(--accent); }
  .card.done .card-checkbox {
    background: var(--accent);
    border-color: var(--accent);
  }
  .card-checkbox svg {
    width: 16px;
    height: 16px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .card.done .card-checkbox svg { opacity: 1; }
  .card-id {
    display: inline-block;
    font-size: 11px;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 4px;
    letter-spacing: 0.5px;
  }
  .card-text {
    font-size: 16px;
    line-height: 1.5;
    color: var(--fg-0);
  }
  .card-min {
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 12px;
    color: var(--fg-2);
    background: rgba(255,255,255,0.04);
    padding: 4px 10px;
    border-radius: 999px;
    border: 1px solid var(--line);
  }

  #fx-canvas {
    position: fixed;
    inset: 0;
    z-index: 99;
    pointer-events: none;
  }

  .victory {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0.6);
    background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent) 60%, white));
    color: #0a0e1a;
    padding: 24px 48px;
    border-radius: 16px;
    font-size: 28px;
    font-weight: 800;
    z-index: 1000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s, transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .victory.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }
</style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="hud">
  <div class="hud-title">
    <span id="hud-task-title">如何阅读一本书</span>
    <span class="meta" id="hud-meta"></span>
  </div>
  <div class="hud-actions">
    <button class="btn" id="btn-sound" title="切换音效">🔊</button>
    <button class="btn" id="btn-reset" title="重置勾选状态">↺ 重置</button>
  </div>
</div>

<div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>

<div class="view active fade-in" id="view-global">
  <svg id="global-svg" xmlns="http://www.w3.org/2000/svg"></svg>
</div>

<div class="view" id="view-focus">
  <div class="focus-wrap">
    <div class="focus-header">
      <button class="focus-back" id="btn-back">← 返回全局地图</button>
      <div class="focus-title" id="focus-title"></div>
      <div class="focus-sub" id="focus-sub"></div>
    </div>
    <div class="card-list" id="card-list"></div>
  </div>
</div>

<canvas id="fx-canvas"></canvas>

<div class="victory" id="victory">🎉 全部完成！</div>

<script id="task-data" type="application/json">
{
  "title": "如何阅读一本书",
  "goal": "从一本书中真正吸收作者的核心观点和论证，并能用自己的话复述、应用，而不是\"翻完了\"。",
  "totalMin": 315,
  "deliverable": "一份个人读书笔记（含一句话主旨、章节结构图、重点摘录、3 条行动启发）",
  "phases": [
    {
      "id": "1",
      "name": "选书与准备",
      "items": [
        { "id": "1.1", "text": "在书架/微信读书/Kindle 里挑出此次要读的那一本，写下书名+作者", "min": 3, "isLeaf": true },
        { "id": "1.2", "text": "用一句话写下\"我为什么读这本书\"（解决什么问题/学什么）", "min": 5, "isLeaf": true },
        { "id": "1.3", "text": "准备好笔记载体（新建一个 Notion/Obsidian 页面或一本纸质本，命名为书名）", "min": 3, "isLeaf": true },
        { "id": "1.4", "text": "设定本次阅读的截止时间（比如 7 天内读完）", "min": 2, "isLeaf": true }
      ]
    },
    {
      "id": "2",
      "name": "检视阅读",
      "items": [
        { "id": "2.1", "text": "读封面、腰封、作者简介，记下作者背景关键词", "min": 5, "isLeaf": true },
        { "id": "2.2", "text": "读目录，把章节标题抄到笔记里，标出最感兴趣的 3 章", "min": 10, "isLeaf": true },
        { "id": "2.3", "text": "读序言/前言/译者序，记录作者自述的\"本书要解决什么问题\"", "min": 10, "isLeaf": true },
        { "id": "2.4", "text": "翻最后一章/结语，瞄一眼作者最终结论", "min": 8, "isLeaf": true },
        { "id": "2.5", "text": "随机翻 5~10 页正文，感受写作密度，决定阅读节奏（粗读还是精读）", "min": 7, "isLeaf": true },
        { "id": "2.6", "text": "在笔记顶部写下 3 个你想从这本书得到答案的问题", "min": 5, "isLeaf": true }
      ]
    },
    {
      "id": "3",
      "name": "分析阅读",
      "items": [
        { "id": "3.1.1", "text": "读完一章后，合上书，用 3 句话复述本章主旨", "min": 10, "isLeaf": true },
        { "id": "3.1.2", "text": "把本章关键概念/术语写到笔记，每个用自己的话定义", "min": 10, "isLeaf": true },
        { "id": "3.1.3", "text": "摘录 1~3 句最打动你的原文，注明页码", "min": 7, "isLeaf": true },
        { "id": "3.1.4", "text": "在页边空白写一个\"对我有什么用\"的小注", "min": 5, "isLeaf": true },
        { "id": "3.2", "text": "每读完 2~3 章，用一张图（思维导图/手绘）画出当前的全书结构", "min": 15, "isLeaf": true },
        { "id": "3.3", "text": "读到反对/疑惑的地方，立刻在笔记里写\"我不同意，因为…\"", "min": 10, "isLeaf": true },
        { "id": "3.4", "text": "全书读完后，用一句话写出作者的核心主张（≤30字）", "min": 10, "isLeaf": true },
        { "id": "3.5", "text": "列出作者用来支撑核心主张的 3~5 个主要论据", "min": 15, "isLeaf": true }
      ]
    },
    {
      "id": "4",
      "name": "主题串联",
      "items": [
        { "id": "4.1", "text": "写下你之前读过/听过的、与本书观点相似的 1~2 个来源", "min": 10, "isLeaf": true },
        { "id": "4.2", "text": "写下与本书观点相反的 1 个来源或反例", "min": 10, "isLeaf": true },
        { "id": "4.3", "text": "用一段话（5~8 句）回答开篇写下的那 3 个问题", "min": 15, "isLeaf": true }
      ]
    },
    {
      "id": "5",
      "name": "输出与内化",
      "items": [
        { "id": "5.1", "text": "写一段 200~300 字的\"一句话推荐+亮点摘要\"（朋友能看懂的程度）", "min": 15, "isLeaf": true },
        { "id": "5.2", "text": "提炼出 3 条可立即应用到生活/工作的行动建议", "min": 12, "isLeaf": true },
        { "id": "5.3", "text": "选其中 1 条最容易做的行动，今天或明天就执行一次", "min": 15, "isLeaf": true },
        { "id": "5.4", "text": "在日历上设定一个\"30 天后回顾\"的提醒", "min": 3, "isLeaf": true },
        { "id": "5.5", "text": "给本书打分（1~10）并写下\"是否推荐 / 推荐给谁\"", "min": 5, "isLeaf": true }
      ]
    }
  ],
  "firstStep": "1.1 打开你想读的那本书，把书名+作者写到笔记第一行。",
  "deps": [
    "必须先做 1.x 再开始 2.x（没准备好笔记载体精读会偷懒）",
    "2.x 完成后再做 3.x（先看骨架再精读，效率高一倍）",
    "3.x 全部完成后再做 4.x（必须读完整本才能串联）",
    "5.x 在 4.x 之后做，但 5.3「立刻执行」可以并行启动"
  ]
}
</script>

<script>
(() => {
  const data = JSON.parse(document.getElementById('task-data').textContent);
  const STORAGE_KEY = 'task-breakdown::' + (data.title || 'untitled');

  const allLeaves = [];
  function collectLeaves(items, parentPhaseId) {
    items.forEach(it => {
      if (it.isLeaf) {
        allLeaves.push({ ...it, phaseId: parentPhaseId });
      } else if (it.children) {
        collectLeaves(it.children, parentPhaseId);
      }
    });
  }
  data.phases.forEach(p => collectLeaves(p.items, p.id));

  let state = {};
  try { state = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) { state = {}; }
  function saveState() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
  }

  let audioCtx = null;
  let soundOn = true;
  function ensureAudio() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch(e) { soundOn = false; }
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }
  function tone({ freq = 600, type = 'sine', dur = 0.1, vol = 0.15, slideTo = null, delay = 0 }) {
    if (!soundOn) return;
    ensureAudio();
    if (!audioCtx) return;
    const t0 = audioCtx.currentTime + delay;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t0);
    if (slideTo !== null) osc.frequency.exponentialRampToValueAtTime(slideTo, t0 + dur);
    gain.gain.setValueAtTime(0, t0);
    gain.gain.linearRampToValueAtTime(vol, t0 + 0.005);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(t0); osc.stop(t0 + dur + 0.02);
  }
  function noiseBurst({ dur = 0.18, vol = 0.08 }) {
    if (!soundOn) return;
    ensureAudio();
    if (!audioCtx) return;
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);
    const ch = buf.getChannelData(0);
    for (let i = 0; i < ch.length; i++) ch[i] = (Math.random() * 2 - 1) * (1 - i / ch.length);
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass'; filter.frequency.value = 800;
    const gain = audioCtx.createGain();
    gain.gain.value = vol;
    src.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
    src.start();
  }
  const SFX = {
    hover:   () => tone({ freq: 800, type: 'sine', dur: 0.05, vol: 0.06 }),
    enter:   () => tone({ freq: 600, type: 'triangle', dur: 0.15, vol: 0.12, slideTo: 1200 }),
    back:    () => noiseBurst({ dur: 0.2, vol: 0.06 }),
    check:   () => {
      tone({ freq: 523.25, type: 'sine', dur: 0.08, vol: 0.12 });
      tone({ freq: 659.25, type: 'sine', dur: 0.08, vol: 0.12, delay: 0.08 });
      tone({ freq: 783.99, type: 'sine', dur: 0.12, vol: 0.14, delay: 0.16 });
    },
    uncheck: () => tone({ freq: 400, type: 'sine', dur: 0.1, vol: 0.1, slideTo: 200 }),
    victory: () => {
      const notes = [523.25, 659.25, 783.99, 1046.50, 1318.51];
      notes.forEach((f, i) => tone({ freq: f, type: 'triangle', dur: 0.18, vol: 0.16, delay: i * 0.1 }));
    },
  };

  const starsCanvas = document.getElementById('stars');
  const starsCtx = starsCanvas.getContext('2d');
  let stars = [];
  function resizeStars() {
    starsCanvas.width = window.innerWidth;
    starsCanvas.height = window.innerHeight;
    stars = Array.from({ length: 90 }, () => ({
      x: Math.random() * starsCanvas.width,
      y: Math.random() * starsCanvas.height,
      r: Math.random() * 1.4 + 0.3,
      vx: (Math.random() - 0.5) * 0.08,
      vy: (Math.random() - 0.5) * 0.08,
      a: Math.random() * 0.6 + 0.2,
    }));
  }
  function drawStars() {
    starsCtx.clearRect(0, 0, starsCanvas.width, starsCanvas.height);
    stars.forEach(s => {
      s.x += s.vx; s.y += s.vy;
      if (s.x < 0) s.x = starsCanvas.width;  if (s.x > starsCanvas.width) s.x = 0;
      if (s.y < 0) s.y = starsCanvas.height; if (s.y > starsCanvas.height) s.y = 0;
      starsCtx.beginPath();
      starsCtx.fillStyle = `rgba(200, 220, 255, ${s.a})`;
      starsCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      starsCtx.fill();
    });
    requestAnimationFrame(drawStars);
  }
  resizeStars();
  drawStars();
  window.addEventListener('resize', resizeStars);

  const fxCanvas = document.getElementById('fx-canvas');
  const fxCtx = fxCanvas.getContext('2d');
  let particles = [];
  function resizeFx() { fxCanvas.width = window.innerWidth; fxCanvas.height = window.innerHeight; }
  resizeFx();
  window.addEventListener('resize', resizeFx);

  function spawnParticles(x, y, count = 24, color = null) {
    const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#34d399';
    for (let i = 0; i < count; i++) {
      const ang = Math.random() * Math.PI * 2;
      const speed = Math.random() * 4 + 2;
      particles.push({
        x, y,
        vx: Math.cos(ang) * speed,
        vy: Math.sin(ang) * speed,
        life: 1,
        decay: Math.random() * 0.02 + 0.015,
        size: Math.random() * 3 + 2,
        color: color || accent,
      });
    }
  }
  function spawnFireworks() {
    const cx = window.innerWidth / 2;
    const cy = window.innerHeight / 2;
    for (let k = 0; k < 6; k++) {
      setTimeout(() => {
        const x = cx + (Math.random() - 0.5) * 400;
        const y = cy + (Math.random() - 0.5) * 200;
        spawnParticles(x, y, 50);
      }, k * 200);
    }
  }
  function tickFx() {
    fxCtx.clearRect(0, 0, fxCanvas.width, fxCanvas.height);
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.08;
      p.life -= p.decay;
      fxCtx.globalAlpha = Math.max(p.life, 0);
      fxCtx.fillStyle = p.color;
      fxCtx.beginPath();
      fxCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      fxCtx.fill();
    });
    fxCtx.globalAlpha = 1;
    requestAnimationFrame(tickFx);
  }
  tickFx();

  const svg = document.getElementById('global-svg');
  const SVG_NS = 'http://www.w3.org/2000/svg';

  function renderGlobal() {
    svg.innerHTML = '';
    const W = window.innerWidth;
    const H = window.innerHeight;
    svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

    const cx = W / 2;
    const cy = H / 2;

    const rootR = 56;
    const phases = data.phases;
    const phaseR = 38;
    const phaseRadius = Math.min(W, H) * 0.22;
    const leafR = 14;
    const leafSpread = Math.min(W, H) * 0.16;

    const total = allLeaves.length;
    const done = allLeaves.filter(l => state[l.id]).length;

    phases.forEach((phase, i) => {
      const ang = (i / phases.length) * Math.PI * 2 - Math.PI / 2;
      const px = cx + Math.cos(ang) * phaseRadius;
      const py = cy + Math.sin(ang) * phaseRadius;
      const line = document.createElementNS(SVG_NS, 'path');
      line.setAttribute('class', 'edge-line');
      line.setAttribute('d', `M${cx},${cy} Q${(cx+px)/2 + (Math.random()-0.5)*20},${(cy+py)/2 + (Math.random()-0.5)*20} ${px},${py}`);
      svg.appendChild(line);
      phase._x = px; phase._y = py; phase._ang = ang;
    });

    phases.forEach((phase, i) => {
      const leaves = [];
      function gather(items) {
        items.forEach(it => {
          if (it.isLeaf) leaves.push(it);
          else if (it.children) gather(it.children);
        });
      }
      gather(phase.items);

      const n = leaves.length;
      leaves.forEach((leaf, j) => {
        const baseAng = phase._ang;
        const spreadAng = (Math.PI / 3) * (n > 1 ? (j / (n - 1) - 0.5) : 0);
        const ang = baseAng + spreadAng;
        const lx = phase._x + Math.cos(ang) * leafSpread;
        const ly = phase._y + Math.sin(ang) * leafSpread;
        leaf._x = lx; leaf._y = ly;

        const line = document.createElementNS(SVG_NS, 'path');
        line.setAttribute('class', 'edge-line');
        line.setAttribute('d', `M${phase._x},${phase._y} L${lx},${ly}`);
        svg.appendChild(line);
      });
      phase._leaves = leaves;
    });

    phases.forEach(phase => {
      phase._leaves.forEach(leaf => {
        const g = document.createElementNS(SVG_NS, 'g');
        const c = document.createElementNS(SVG_NS, 'circle');
        c.setAttribute('class', 'node-circle');
        c.setAttribute('cx', leaf._x);
        c.setAttribute('cy', leaf._y);
        c.setAttribute('r', leafR);
        c.setAttribute('fill', state[leaf.id] ? 'var(--ok)' : 'rgba(255,255,255,0.08)');
        c.setAttribute('stroke', state[leaf.id] ? 'var(--ok)' : 'var(--accent-soft)');
        c.setAttribute('stroke-width', '1.5');
        c.addEventListener('mouseenter', () => SFX.hover());
        c.addEventListener('click', () => { SFX.enter(); enterFocus(phase.id); });
        g.appendChild(c);

        const label = document.createElementNS(SVG_NS, 'text');
        label.setAttribute('class', 'node-sub');
        label.setAttribute('x', leaf._x);
        label.setAttribute('y', leaf._y + leafR + 14);
        label.textContent = leaf.id;
        g.appendChild(label);

        svg.appendChild(g);
      });
    });

    phases.forEach(phase => {
      const g = document.createElementNS(SVG_NS, 'g');
      const c = document.createElementNS(SVG_NS, 'circle');
      c.setAttribute('class', 'node-circle');
      c.setAttribute('cx', phase._x);
      c.setAttribute('cy', phase._y);
      c.setAttribute('r', phaseR);
      c.setAttribute('fill', 'var(--bg-2)');
      c.setAttribute('stroke', 'var(--accent)');
      c.setAttribute('stroke-width', '2');
      c.addEventListener('mouseenter', () => SFX.hover());
      c.addEventListener('click', () => { SFX.enter(); enterFocus(phase.id); });
      g.appendChild(c);

      const label = document.createElementNS(SVG_NS, 'text');
      label.setAttribute('class', 'node-label');
      label.setAttribute('x', phase._x);
      label.setAttribute('y', phase._y - 4);
      label.textContent = phase.id;
      g.appendChild(label);

      const sub = document.createElementNS(SVG_NS, 'text');
      sub.setAttribute('class', 'node-sub');
      sub.setAttribute('x', phase._x);
      sub.setAttribute('y', phase._y + 12);
      sub.textContent = (phase.name || '').slice(0, 6);
      g.appendChild(sub);

      svg.appendChild(g);
    });

    const rg = document.createElementNS(SVG_NS, 'g');
    rg.setAttribute('class', 'root-node');
    const rc = document.createElementNS(SVG_NS, 'circle');
    rc.setAttribute('class', 'node-circle');
    rc.setAttribute('cx', cx);
    rc.setAttribute('cy', cy);
    rc.setAttribute('r', rootR);
    rc.setAttribute('fill', 'var(--accent)');
    rc.setAttribute('opacity', '0.9');
    rg.appendChild(rc);

    const rl = document.createElementNS(SVG_NS, 'text');
    rl.setAttribute('class', 'node-label');
    rl.setAttribute('x', cx);
    rl.setAttribute('y', cy - 4);
    rl.style.fontSize = '15px';
    rl.style.fontWeight = '700';
    rl.style.fill = '#0a0e1a';
    rl.textContent = (data.title || '').slice(0, 8);
    rg.appendChild(rl);

    const rs = document.createElementNS(SVG_NS, 'text');
    rs.setAttribute('class', 'node-sub');
    rs.setAttribute('x', cx);
    rs.setAttribute('y', cy + 14);
    rs.style.fill = '#0a0e1a';
    rs.style.fontWeight = '600';
    rs.textContent = `${done}/${total}`;
    rg.appendChild(rs);

    svg.appendChild(rg);

    updateProgress();
  }

  function enterFocus(phaseId) {
    const phase = data.phases.find(p => p.id === phaseId);
    if (!phase) return;
    const leaves = [];
    function gather(items) {
      items.forEach(it => {
        if (it.isLeaf) leaves.push(it);
        else if (it.children) gather(it.children);
      });
    }
    gather(phase.items);

    document.getElementById('focus-title').textContent = `${phase.id}. ${phase.name}`;
    const phaseTotal = leaves.reduce((s,l) => s + (l.min || 0), 0);
    document.getElementById('focus-sub').textContent =
      `共 ${leaves.length} 项 · 预计 ~${phaseTotal} 分钟`;

    const list = document.getElementById('card-list');
    list.innerHTML = '';
    leaves.forEach(leaf => {
      const card = document.createElement('div');
      card.className = 'card' + (state[leaf.id] ? ' done' : '');
      card.innerHTML = `
        <div class="card-checkbox">
          <svg viewBox="0 0 24 24" fill="none" stroke="#0a0e1a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </div>
        <div class="card-id">${leaf.id}</div>
        <div class="card-text">${escapeHtml(leaf.text)}</div>
        <div class="card-min">⏱️ ~${leaf.min || '?'}min</div>
      `;
      card.addEventListener('mouseenter', () => SFX.hover());
      card.addEventListener('click', (e) => {
        const wasDone = !!state[leaf.id];
        state[leaf.id] = !wasDone;
        saveState();
        if (!wasDone) {
          card.classList.add('done');
          SFX.check();
          const rect = card.getBoundingClientRect();
          spawnParticles(rect.left + 32, rect.top + rect.height/2, 28);
          checkVictory();
        } else {
          card.classList.remove('done');
          SFX.uncheck();
        }
        updateProgress();
      });
      list.appendChild(card);
    });

    switchView('focus');
  }

  function switchView(name) {
    const g = document.getElementById('view-global');
    const f = document.getElementById('view-focus');
    if (name === 'focus') {
      g.classList.remove('active');
      f.classList.add('active');
    } else {
      f.classList.remove('active');
      g.classList.add('active');
      renderGlobal();
    }
  }

  function updateProgress() {
    const total = allLeaves.length;
    const done = allLeaves.filter(l => state[l.id]).length;
    const pct = total ? (done / total * 100) : 0;
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('hud-meta').textContent =
      `${done}/${total} · 预计 ${data.totalMin || '?'}min`;
  }
  function checkVictory() {
    const total = allLeaves.length;
    const done = allLeaves.filter(l => state[l.id]).length;
    if (total > 0 && done === total) {
      const v = document.getElementById('victory');
      v.classList.add('show');
      SFX.victory();
      spawnFireworks();
      setTimeout(() => v.classList.remove('show'), 2800);
    }
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  document.getElementById('btn-back').addEventListener('click', () => {
    SFX.back();
    switchView('global');
  });
  document.getElementById('btn-sound').addEventListener('click', (e) => {
    soundOn = !soundOn;
    e.currentTarget.textContent = soundOn ? '🔊' : '🔇';
    if (soundOn) SFX.hover();
  });
  document.getElementById('btn-reset').addEventListener('click', () => {
    if (!confirm('重置所有勾选状态？')) return;
    state = {};
    saveState();
    SFX.back();
    renderGlobal();
    updateProgress();
  });
  window.addEventListener('resize', () => {
    if (document.getElementById('view-global').classList.contains('active')) {
      renderGlobal();
    }
  });
  ['click', 'keydown', 'touchstart'].forEach(ev => {
    document.addEventListener(ev, ensureAudio, { once: true });
  });

  renderGlobal();
  updateProgress();
  setTimeout(checkVictory, 200);
})();
</script>
</body>
</html>
